<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revisor de Contratos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#f0ede8;--ink:#1c1a17;--muted:#6b6560;--border:#ddd9d2;--accent:#c0490d;--accent-d:#9a3a0a;--accent-bg:#fdf1ec;--green:#2d7a4f;--green-bg:#edf7f1;--r:10px;--rs:6px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px;display:flex;flex-direction:column;}
header{background:var(--ink);color:#f5f4f0;padding:16px 32px;display:flex;align-items:center;gap:14px;border-bottom:3px solid var(--accent);flex-shrink:0;}
header h1{font-family:'Playfair Display',serif;font-size:1.3rem;}
header small{font-size:11px;color:#a09890;letter-spacing:.14em;text-transform:uppercase;}
.app{display:grid;grid-template-columns:220px 1fr;flex:1;overflow:hidden;}
.sidebar{background:#f0ede8;border-right:1px solid var(--border);padding:22px 18px;display:flex;flex-direction:column;gap:20px;overflow-y:auto;}
.slabel{font-size:10px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.upload-zone{border:2px dashed var(--border);border-radius:var(--r);padding:20px 12px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface);position:relative;}
.upload-zone:hover,.upload-zone.over{border-color:var(--accent);background:var(--accent-bg);}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-zone svg{display:block;margin:0 auto 8px;color:var(--muted);}
.upload-zone p{font-size:12px;color:var(--muted);line-height:1.5;}
.upload-zone strong{color:var(--accent);}
.file-chip{background:var(--green-bg);border:1px solid #b0ddc0;border-radius:var(--rs);padding:9px 12px;display:none;align-items:center;gap:8px;}
.file-chip.on{display:flex;}
.fn{font-size:12px;font-weight:500;color:var(--green);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fs{font-size:11px;color:var(--muted);}
.rm{background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:0 2px;}.rm:hover{color:var(--accent);}
.analyze-btn{width:100%;padding:10px 14px;background:var(--ink);color:#f5f4f0;border:none;border-radius:var(--rs);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px;}
.analyze-btn:hover:not(:disabled){background:#333;}
.analyze-btn:disabled{opacity:.4;cursor:not-allowed;}
.status-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);margin-top:8px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;}
.dot.ok{background:var(--green);}.dot.spin{background:var(--accent);animation:pulse .8s infinite;}.dot.err{background:#e44;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.err-msg{background:#fdf1ec;border:1px solid #f0c0b0;border-radius:var(--rs);padding:10px 12px;font-size:12px;color:#8a2a0a;line-height:1.5;display:none;margin-bottom:4px;}
.err-msg.on{display:block;}
.quick-list{display:flex;flex-direction:column;gap:6px;}
.qbtn{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:8px 11px;text-align:left;cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;color:var(--ink);transition:all .15s;line-height:1.4;}
.qbtn:hover{border-color:var(--accent);color:var(--accent);}
.main{display:flex;flex-direction:column;background:var(--surface);overflow:hidden;}
.chat-area{flex:1;overflow-y:auto;padding:24px 28px;display:flex;flex-direction:column;gap:12px;}
.empty-state{margin:auto;text-align:center;color:var(--muted);font-size:13px;line-height:1.8;max-width:320px;}
.empty-state svg{margin:0 auto 16px;display:block;opacity:.2;}
.empty-state strong{color:var(--ink);}
.msg{display:flex;gap:10px;width:100%;}
.msg.u{flex-direction:row-reverse;}
.av{width:30px;height:30px;border-radius:50%;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.av.ua{background:var(--ink);color:#f5f4f0;}.av.ba{background:var(--accent-bg);color:var(--accent);border:1px solid #f0c0a8;}
.bubble{flex:1;padding:16px 20px;border-radius:12px;font-size:13px;line-height:1.8;word-break:break-word;}
.msg.u .bubble{background:var(--ink);color:#f5f4f0;border-bottom-right-radius:3px;flex:0 1 auto;max-width:80%;}
.msg.bot .bubble{background:var(--surface2);color:var(--ink);border-bottom-left-radius:3px;}
.bubble p{margin-bottom:8px;}.bubble p:last-child{margin-bottom:0;}
.bubble ul{margin:6px 0 8px 18px;}.bubble li{margin-bottom:5px;}
.bubble strong{font-weight:600;}
.bubble h3{font-size:13px;font-weight:700;margin:14px 0 4px;color:var(--ink);padding-top:12px;border-top:1px solid var(--border);}
.bubble h3:first-child{margin-top:0;padding-top:0;border-top:none;}
.client-box{background:#fff;border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:14px 18px;margin-bottom:16px;font-size:13px;line-height:2;}
.client-box .ctitle{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.client-box p{margin:0;color:var(--ink);}
.typing{display:flex;gap:4px;align-items:center;padding:10px 14px;background:var(--surface2);border-radius:12px;border-bottom-left-radius:3px;width:fit-content;}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:bo 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bo{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
.input-bar{padding:14px 28px 18px;border-top:1px solid var(--border);flex-shrink:0;}
.input-wrap{display:flex;gap:8px;align-items:flex-end;}
.input-wrap textarea{flex:1;min-height:42px;max-height:120px;resize:none;padding:10px 13px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);font-family:'Inter',sans-serif;font-size:13px;color:var(--ink);outline:none;transition:border-color .2s;line-height:1.5;}
.input-wrap textarea:focus{border-color:var(--accent);}
.input-wrap textarea:disabled{opacity:.45;cursor:not-allowed;}
.send-btn{width:42px;height:42px;border-radius:var(--rs);background:var(--accent);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;}
.send-btn:hover:not(:disabled){background:var(--accent-d);}
.send-btn:disabled{background:var(--border);cursor:not-allowed;}
.hint{font-size:11px;color:var(--muted);margin-top:6px;text-align:right;}
.client-box{background:#fff8f5;border:1px solid #f0c0a8;border-left:4px solid var(--accent);border-radius:8px;padding:14px 18px;margin-bottom:16px;font-size:13px;line-height:2;}
.client-box .ctitle{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.client-box p{margin:2px 0;color:var(--ink);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header><h1>Revisor de Contratos</h1><small>Analisis inteligente - Contratos de servicios</small></header>
<div class="app">
<aside class="sidebar">
<div><div class="slabel">Contrato PDF</div>
<div class="upload-zone" id="uploadZone"><input type="file" id="fileInput" accept=".pdf">
<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/></svg>
<p>Arrastra el PDF o <strong>haz clic</strong></p></div>
<div class="file-chip" id="fileChip"><span class="fn" id="fileName"></span><span class="fs" id="fileSize"></span><button class="rm" id="removeBtn">x</button></div></div>
<div><div class="slabel">Analisis automatico</div>
<div class="err-msg" id="errMsg"></div>
<button class="analyze-btn" id="analyzeBtn" disabled onclick="doAnalyze()">Analizar contrato</button>
<div class="status-row"><div class="dot" id="statusDot"></div><span id="statusText">Sube un PDF para empezar</span></div></div>
<div><div class="slabel">Preguntas rapidas</div>
<div class="quick-list">
<button class="qbtn" onclick="sq('Hay clausulas riesgosas o desfavorables para nosotros?')">Clausulas riesgosas?</button>
<button class="qbtn" onclick="sq('Dame un resumen ejecutivo en 5 puntos.')">Resumen ejecutivo</button>
<button class="qbtn" onclick="sq('Cuales son las obligaciones principales de cada parte?')">Obligaciones</button>
<button class="qbtn" onclick="sq('Cuales son las causas de rescision del contrato?')">Causas de rescision</button>
<button class="qbtn" onclick="sq('Hay plazos importantes que debamos tener en cuenta?')">Plazos importantes</button>
</div></div></aside>
<div class="main">
<div class="chat-area" id="chatArea">
<div class="empty-state" id="emptyState"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.1"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Sube un contrato PDF y pulsa<br><strong>Analizar contrato</strong></div>
</div>
<div class="input-bar">
<div class="input-wrap">
<textarea id="chatTxt" placeholder="Pregunta sobre el contrato..." rows="1" disabled></textarea>
<button class="send-btn" id="sendBtn" disabled onclick="doSend()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
</div>
<div class="hint" id="hint">Sube un PDF para habilitar el chat</div>
</div></div></div>
<script>
let pdfFile=null,pdfB64=null,history=[],busy=false;
const fi=document.getElementById('fileInput'),uz=document.getElementById('uploadZone');
uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('over');});
uz.addEventListener('dragleave',()=>uz.classList.remove('over'));
uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('over');const f=e.dataTransfer.files[0];if(f&&f.type.includes('pdf'))loadFile(f);});
fi.addEventListener('change',()=>{if(fi.files[0])loadFile(fi.files[0]);});
document.getElementById('removeBtn').addEventListener('click',resetFile);
function loadFile(file){pdfFile=file;const r=new FileReader();r.onload=e=>{pdfB64=e.target.result.split(',')[1];};r.readAsDataURL(file);document.getElementById('fileName').textContent=file.name;document.getElementById('fileSize').textContent=(file.size/1024).toFixed(0)+' KB';document.getElementById('fileChip').classList.add('on');document.getElementById('uploadZone').style.display='none';document.getElementById('analyzeBtn').disabled=false;document.getElementById('chatTxt').disabled=false;document.getElementById('sendBtn').disabled=false;document.getElementById('hint').textContent='Enter para enviar';history=[];setStatus('ok','Contrato cargado');hideErr();}
function resetFile(){pdfFile=null;pdfB64=null;fi.value='';document.getElementById('fileChip').classList.remove('on');document.getElementById('uploadZone').style.display='';document.getElementById('analyzeBtn').disabled=true;document.getElementById('chatTxt').disabled=true;document.getElementById('sendBtn').disabled=true;document.getElementById('hint').textContent='Sube un PDF';history=[];setStatus('','Sube un PDF para empezar');hideErr();}
async function doAnalyze(){
  if(!pdfFile)return;hideErr();setStatus('spin','Analizando...');
  const btn=document.getElementById('analyzeBtn');btn.disabled=true;btn.textContent='Analizando...';
  try{
    const fd=new FormData();fd.append('pdf',pdfFile);
    const res=await fetch('/api/analyze',{method:'POST',body:fd});
    if(!res.ok){const e=await res.json();throw new Error(JSON.stringify(e.error||e));}
    const data=await res.json();
    document.getElementById('emptyState').style.display='none';
    mostrarResultado(data.cliente, data.analisis);
    setStatus('ok','Analisis completado');
  }catch(e){showErr(e.message);setStatus('err','Error');}
  btn.disabled=false;btn.textContent='Analizar contrato';
}
function mostrarResultado(cliente, analisis){
  var ca=document.getElementById('chatArea');
  var d=document.createElement('div');d.className='msg bot';
  var cbox='';
  if(cliente && cliente.trim().length>5){
    var lines=cliente.trim().split('\n').filter(function(l){return l.trim().length>2;});
    cbox='<div class="client-box"><div class="ctitle">Cliente que nos contrata</div>'+lines.map(function(l){return '<p>'+l.replace(/\*\*/g,'').trim()+'</p>';}).join('')+'</div>';
  }
  d.innerHTML='<div class="av ba">IA</div><div class="bubble">'+cbox+fmt(analisis||'')+'</div>';
  ca.appendChild(d);ca.scrollTop=ca.scrollHeight;
}
function sq(txt){if(!pdfB64){alert('Primero sube un PDF');return;}document.getElementById('chatTxt').value=txt;doSend();}
const chatTxt=document.getElementById('chatTxt');
chatTxt.addEventListener('input',()=>{chatTxt.style.height='auto';chatTxt.style.height=Math.min(chatTxt.scrollHeight,120)+'px';});
chatTxt.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}});
async function doSend(){
  const t=chatTxt.value.trim();if(!t||busy||!pdfB64)return;
  addMsg('u',t);chatTxt.value='';chatTxt.style.height='auto';setBusy(true);
  let msgs;
  if(history.length===0){msgs=[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:pdfB64}},{type:'text',text:t}]}];}
  else{msgs=[...history,{role:'user',content:t}];}
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:msgs})});
    if(!res.ok){const e=await res.json();throw new Error(e.error||'Error');}
    const data=await res.json();history.push({role:'user',content:t});history.push({role:'assistant',content:data.reply});addMsg('bot',fmt(data.reply));
  }catch(e){addMsg('bot','Error: '+e.message);}setBusy(false);
}
function fmt(t){return t.replace(/^---$/gm,'').replace(/**(.*?)**/g,'<strong>$1</strong>').replace(/^#{1,3} (.+)$/gm,'<h3>$1</h3>').replace(/^* (.+)$/gm,'<li>$1</li>').replace(/^- (.+)$/gm,'<li>$1</li>').replace(/(<li>.*</li>
?)+/g,m=>'<ul>'+m+'</ul>').split('
').map(line=>{if(line.startsWith('<'))return line;if(line.trim()==='')return '';return '<p>'+line+'</p>';}).filter(l=>l!=='').join('
');}
function addMsg(role,html){document.getElementById('emptyState').style.display='none';const d=document.createElement('div');d.className='msg '+(role==='u'?'u':'bot');const safe=role==='u'?html.replace(/</g,'&lt;'):html;d.innerHTML='<div class="av '+(role==='u'?'ua':'ba')+'">'+(role==='u'?'Tu':'IA')+'</div><div class="bubble">'+safe+'</div>';const ca=document.getElementById('chatArea');ca.appendChild(d);ca.scrollTop=ca.scrollHeight;}
function setBusy(v){busy=v;document.getElementById('sendBtn').disabled=v;chatTxt.disabled=v;const t=document.getElementById('typingInd');if(v){const d=document.createElement('div');d.id='typingInd';d.className='msg bot';d.innerHTML='<div class="av ba">IA</div><div class="typing"><span></span><span></span><span></span></div>';const ca=document.getElementById('chatArea');ca.appendChild(d);ca.scrollTop=ca.scrollHeight;}else{if(t)t.remove();chatTxt.disabled=!pdfB64;document.getElementById('sendBtn').disabled=!pdfB64;}}
function setStatus(t,txt){const d=document.getElementById('statusDot');d.className='dot'+(t?' '+t:'');document.getElementById('statusText').textContent=txt;}
function showErr(m){const b=document.getElementById('errMsg');b.textContent=m;b.classList.add('on');}
function hideErr(){document.getElementById('errMsg').classList.remove('on');}
</script>
</body>
</html>
